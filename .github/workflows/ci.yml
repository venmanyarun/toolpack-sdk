name: CI

on:
  push:
    branches: [ "main", "develop", "develop/pre-merge" ]
  pull_request:
    branches: [ "main", "develop", "develop/pre-merge" ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x, 22.x]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Build
      run: npm run build
      
    - name: Run Tests
      run: npm run test
